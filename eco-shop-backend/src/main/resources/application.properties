# H2 In-Memory Database Configuration
spring.datasource.url=jdbc:h2:mem:ecoshops;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Automatically create tables based on your Java Entities
spring.jpa.hibernate.ddl-auto=update

# Optional: Enables a web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true

# JWT
jwt.secret=ecoshop-super-secret-key-that-is-at-least-256-bits-long-for-hs256-signing
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:3000

